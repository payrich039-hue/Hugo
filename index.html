<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checker Web - Gateway PayPal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .result-item {
            background: #f8f9fa;
            border-left: 4px solid;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .result-item.approved {
            border-left-color: #28a745;
        }

        .result-item.declined {
            border-left-color: #dc3545;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .progress.active {
            display: block;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            color: white;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 CHECKER WEB</h1>
            <p>Gateway PayPal - Sistema de Verificação de Cartões</p>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('mass')">📊 Verificação em Massa</button>
            <button class="tab-btn" onclick="switchTab('proxy')">🌐 Gerenciar Proxies</button>
        </div>

        <!-- Mass Check Tab -->
        <div id="mass-tab" class="tab-content active">
            <div class="card">
                <h2>📊 Verificação em Massa</h2>
                <textarea id="mass-cards" rows="10" placeholder="Digite os cartões aqui (um por linha)&#10;Ex:&#10;4111111111111111|12|2026|123&#10;5111111111111111|01|2027|456"></textarea>
                <button class="btn" onclick="startMassCheck()">▶️ Iniciar Verificação</button>
                <button class="btn btn-danger" onclick="clearResults()">🗑️ Limpar Resultados</button>
            </div>

            <div class="stats" id="stats" style="display: none;">
                <div class="stat-box">
                    <div class="stat-number" id="total-count">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="approved-count">0</div>
                    <div class="stat-label">Aprovados ✅</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="declined-count">0</div>
                    <div class="stat-label">Recusados ❌</div>
                </div>
            </div>

            <div class="progress" id="progress">
                <div class="spinner"></div>
                <p>Verificando cartões...</p>
            </div>

            <div class="card" id="results-container" style="display: none;">
                <h2>📋 Resultados da Verificação</h2>
                <div id="results-list"></div>
            </div>
        </div>

        <!-- Proxy Management Tab -->
        <div id="proxy-tab" class="tab-content">
            <div class="card">
                <h2>🌐 Gerenciar Proxies</h2>
                <textarea id="proxy-list" rows="8" placeholder="Formatos:&#10;http://user:pass@host:port&#10;user:pass@host:port&#10;host:port"></textarea>
                <button class="btn" onclick="addProxies()">➕ Adicionar Proxies</button>
                <button class="btn" onclick="testProxies()">🧪 Testar Proxies</button>
                <button class="btn" onclick="viewProxies()">👁️ Ver Proxies</button>
                <button class="btn btn-danger" onclick="deleteProxies()">🗑️ Deletar Todos</button>
            </div>
            <div id="proxy-result" class="card" style="display: none;">
                <h2>📋 Informação dos Proxies</h2>
                <div id="proxy-result-content"></div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');
        }

        async function startMassCheck() {
            const cardsText = document.getElementById('mass-cards').value;
            if (!cardsText.trim()) {
                alert('Por favor, insira pelo menos um cartão');
                return;
            }
            
            document.getElementById('progress').classList.add('active');
            document.getElementById('stats').style.display = 'flex';
            document.getElementById('results-container').style.display = 'block';
            document.getElementById('results-list').innerHTML = '';
            
            try {
                const response = await fetch('/api/check_mass', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cards: cardsText })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('total-count').textContent = data.total;
                    document.getElementById('approved-count').textContent = data.approved_count;
                    document.getElementById('declined-count').textContent = data.declined_count;
                    
                    const resultsList = document.getElementById('results-list');
                    data.all_results.forEach(result => {
                        const isApproved = result.status.includes('✅');
                        const resultDiv = document.createElement('div');
                        resultDiv.className = `result-item ${isApproved ? 'approved' : 'declined'}`;
                        resultDiv.innerHTML = `
                            <div class="result-header">
                                <strong>${result.status}</strong>
                                <span>${result.time}</span>
                            </div>
                            <div><strong>Cartão:</strong> ${result.card}</div>
                            <div><strong>Resposta:</strong> ${result.response}</div>
                            ${result.bin_info && result.bin_info.brand ? `
                                <div style="font-size: 12px; color: #666; margin-top: 5px;">
                                    BIN: ${result.bin_info.brand} | ${result.bin_info.bank || 'N/A'} | ${result.bin_info.country_name || 'N/A'}
                                </div>
                            ` : ''}
                        `;
                        resultsList.appendChild(resultDiv);
                    });
                }
            } catch (error) {
                alert('Erro: ' + error.message);
            } finally {
                document.getElementById('progress').classList.remove('active');
            }
        }
        
        function clearResults() {
            document.getElementById('results-list').innerHTML = '';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('results-container').style.display = 'none';
        }
        
        async function addProxies() {
            const proxyText = document.getElementById('proxy-list').value;
            if (!proxyText.trim()) {
                alert('Por favor, insira pelo menos um proxy');
                return;
            }
            
            try {
                const response = await fetch('/api/add_proxies', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ proxies: proxyText })
                });
                
                const data = await response.json();
                
                const resultDiv = document.getElementById('proxy-result');
                const contentDiv = document.getElementById('proxy-result-content');
                
                resultDiv.style.display = 'block';
                contentDiv.innerHTML = `<div class="result-item approved">✅ ${data.added} proxies adicionados! Total: ${data.total}</div>`;
                document.getElementById('proxy-list').value = '';
            } catch (error) {
                alert('Erro: ' + error.message);
            }
        }
        
        async function testProxies() {
            try {
                const response = await fetch('/api/test_proxies', { method: 'POST' });
                const data = await response.json();
                
                const resultDiv = document.getElementById('proxy-result');
                const contentDiv = document.getElementById('proxy-result-content');
                
                resultDiv.style.display = 'block';
                contentDiv.innerHTML = `<div class="result-item approved">✅ ${data.working} proxies funcionando de ${data.total}</div>`;
            } catch (error) {
                alert('Erro: ' + error.message);
            }
        }
        
        async function viewProxies() {
            try {
                const response = await fetch('/api/view_proxies');
                const data = await response.json();
                
                const resultDiv = document.getElementById('proxy-result');
                const contentDiv = document.getElementById('proxy-result-content');
                
                resultDiv.style.display = 'block';
                if (data.total > 0) {
                    let html = `<div class="result-item approved"><strong>📊 Total: ${data.total}</strong><br>`;
                    data.proxies.forEach(proxy => {
                        html += `${proxy}<br>`;
                    });
                    html += '</div>';
                    contentDiv.innerHTML = html;
                } else {
                    contentDiv.innerHTML = '<div class="result-item declined">❌ Nenhum proxy na lista</div>';
                }
            } catch (error) {
                alert('Erro: ' + error.message);
            }
        }
        
        async function deleteProxies() {
            if (confirm('Tem certeza que deseja deletar TODOS os proxies?')) {
                try {
                    await fetch('/api/delete_proxies', { method: 'POST' });
                    const resultDiv = document.getElementById('proxy-result');
                    const contentDiv = document.getElementById('proxy-result-content');
                    resultDiv.style.display = 'block';
                    contentDiv.innerHTML = '<div class="result-item approved">🗑️ Todos os proxies foram deletados!</div>';
                } catch (error) {
                    alert('Erro: ' + error.message);
                }
            }
        }
    </script>
</body>
</html>
